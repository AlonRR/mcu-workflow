# Default cage configuration for `mcuflow up` (the launcher).
# Override any key here, or with command-line flags.

image: espressif/idf:release-v6.0   # pinned ESP-IDF image (the cage base)
container: mcuflow-cage             # docker container name (per project)
agent: "claude --dangerously-skip-permissions"   # agent run inside; swappable

mount_to: /work                     # host project dir is mounted here

# Boundary (enforced at the cage wall - see ARCHITECTURE.md Section 7).
cap_drop_all: true                  # docker --cap-drop ALL
no_new_privileges: true             # docker --security-opt no-new-privileges
non_root: true                      # run as the host uid:gid (Linux)

# Egress control. Full enforcement is the allowlisting proxy + docker network
# from deliverable #7; set these to route the agent through it.
network: ""                         # e.g. "cage-net"
https_proxy: ""                     # e.g. "http://proxy:3128"
