name: smoke

# Hardware-free regression: runs the whole mcuflow loop in simulation
# (validate -> scaffold -> build -> flash -> HIL) plus the launcher dry-run.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install (editable, with dev extras)
        run: uv pip install --system -e ".[dev]"
      - name: Run tests
        run: pytest
