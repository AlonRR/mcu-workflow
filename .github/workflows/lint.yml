name: lint

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uvx ruff check .
      - name: Format check
        run: uvx ruff format --check .
