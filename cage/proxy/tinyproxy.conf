# Default-deny egress proxy. Only hosts matching allowlist.txt are reachable;
# everything else is refused. This is the cage's single route to the network.
Port 8888
Listen 0.0.0.0
Timeout 600

# Who may use the proxy. The cage-net is internal, so only the cage reaches us;
# tighten to the cage subnet if you pin one.
Allow 0.0.0.0/0

# Host allowlist (POSIX-extended regex, case-insensitive), default deny.
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off
FilterURLs Off
Filter "/etc/tinyproxy/allowlist.txt"

# Allow HTTPS CONNECT to 443 (and 80) only - the filter still applies to host.
ConnectPort 443
ConnectPort 80
