# cage.yaml - read by `mcuflow up` from the project root.
# Tuned for the two-ESP32-C3 bring-up. Override any key with a CLI flag.

# Base image works out of the box (ESP-IDF + esptool, no agent inside).
# To seat a specific agent (e.g. Claude Code) INSIDE the cage, build a custom
# image once:  docker build -t mcuflow-cage:idf6 -f src/launcher/Dockerfile src/launcher/
# then set `image:` to it and pass any auth at run time via your own wrapper, or
# simpler: run the agent on the HOST and use the cage only to build/flash.
image: espressif/idf:release-v6.0
container: mcuflow-cage

# REQUIRED: the in-cage agent command. The launcher won't pick one - it must be
# defined here (or via --agent) before the cage starts. The base image only has
# a shell, so `bash` is the default for it; set the real agent command when using
# a custom image that has that agent installed.
agent: "bash"

mount_to: /work

# Boundary (enforced at the cage wall - docs/architecture.md Section 7).
cap_drop_all: true
no_new_privileges: true
non_root: true

# Egress allowlist (deliverable #7). Leave blank for a first bench run; set to
# route the agent through the allowlisting proxy when you harden it.
network: ""
https_proxy: ""
